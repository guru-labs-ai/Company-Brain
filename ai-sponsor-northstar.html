<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>AI Sponsor — North Star</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0080D4; --blue-dark:#0068AC; --ink:#212529; --muted:#6B7280;
  --bg:#F0F4F8; --card:#FFFFFF; --line:#E5E7EB; --gold:#B45309; --gold-bg:#FEF3C7;
  --chart:#2a78d6; --chart-fill:rgba(42,120,214,0.12);
}
@media (prefers-color-scheme: dark){
  :root{
    --ink:#F3F4F6; --muted:#9CA3AF; --bg:#0f1720; --card:#182230; --line:#26303e;
    --gold:#fad98c; --gold-bg:#2a2415; --chart:#3987e5; --chart-fill:rgba(57,135,229,0.16);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:20px 16px 44px}
.wrap{max-width:520px;margin:0 auto}

.hero{background:linear-gradient(160deg,var(--blue),var(--blue-dark));color:#fff;border-radius:22px;
  padding:32px 24px 26px;text-align:center;box-shadow:0 8px 28px rgba(0,128,212,0.30);
  position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-70px;right:-70px;width:200px;height:200px;
  border-radius:50%;background:rgba(255,255,255,0.08)}
.hero::after{content:'';position:absolute;bottom:-90px;left:-60px;width:220px;height:220px;
  border-radius:50%;background:rgba(255,255,255,0.06)}
.hero .eyebrow{font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;opacity:0.85}
.hero .big{font-size:74px;font-weight:800;letter-spacing:-0.03em;line-height:1.05;margin:8px 0 2px;
  font-variant-numeric:tabular-nums}
.hero .unit{font-size:17px;font-weight:600;opacity:0.95}
.hero .meaning{font-size:13.5px;margin-top:12px;opacity:0.9;line-height:1.55;position:relative}
.hero .growth{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.16);
  border:1px solid rgba(255,255,255,0.28);border-radius:99px;padding:6px 14px;margin-top:14px;
  font-size:12.5px;font-weight:700;position:relative}
.pulse{width:8px;height:8px;border-radius:50%;background:#7CFCB1;animation:pu 1.6s infinite;flex:none}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.25}}
.stamp{text-align:center;font-size:11.5px;color:var(--muted);margin:10px 0 20px}

.chips{display:flex;gap:8px;margin-bottom:14px}
.chip{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 6px;
  text-align:center}
.chip.won{background:linear-gradient(0deg,var(--gold-bg),var(--card));border-color:#F5D488}
.chip .em{font-size:22px}
.chip .n{font-size:17px;font-weight:800;margin-top:2px}
.chip .l{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px;text-transform:uppercase;letter-spacing:0.03em}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 18px 12px;margin-bottom:14px}
.card h2{font-size:14px;font-weight:700}
.card .sub{font-size:11.5px;color:var(--muted);margin:2px 0 12px}
.chart{position:relative;height:160px}
.chart svg{width:100%;height:100%;display:block;overflow:visible}
.gridline{stroke:var(--line);stroke-width:1}
.tick{font-size:9.5px;fill:var(--muted)}
.tooltip{position:absolute;pointer-events:none;background:var(--card);border:1px solid var(--line);
  border-radius:8px;padding:6px 9px;font-size:11.5px;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,0.16);
  display:none;white-space:nowrap;z-index:2}

.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px}
.tile .label{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em}
.tile .value{font-size:21px;font-weight:750;margin-top:3px}
.notes{font-size:11px;color:var(--muted);line-height:1.6;padding:2px 6px 0}
.notes li{margin-left:15px;margin-bottom:3px}
.state{text-align:center;padding:48px 12px;color:var(--muted);font-size:13.5px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <div id="loading" class="state">Connecting to live data…<br>
    <span style="font-size:11.5px">(up to ~1 min if the server is waking up)</span></div>

  <div id="dash" style="display:none">
    <div class="hero">
      <div class="eyebrow">🌱 AI Sponsor · North Star</div>
      <div class="big" id="ns-value">0</div>
      <div class="unit">days of recovery, held together</div>
      <div class="meaning" id="ns-meaning"></div>
      <div class="growth"><span class="pulse"></span><span id="ns-growth"></span></div>
    </div>
    <div class="stamp" id="stamp"></div>

    <div class="chips" id="chips"></div>

    <div class="card">
      <h2>The mountain grows</h2>
      <div class="sub">Total recovery days across everyone · last 14 days</div>
      <div class="chart" id="chart"><div class="tooltip" id="tip"></div></div>
    </div>

    <div class="tiles">
      <div class="tile"><div class="label">People on the road</div><div class="value" id="t-users">—</div></div>
      <div class="tile"><div class="label">Avg days each</div><div class="value" id="t-avg">—</div></div>
      <div class="tile"><div class="label">Cancellations</div><div class="value" id="t-cancel">—</div></div>
      <div class="tile"><div class="label">Chatted (7 days)</div><div class="value" id="t-7d">—</div></div>
    </div>

    <ul class="notes" id="notes"></ul>
  </div>

  <div id="error" class="state" style="display:none"></div>
</div>

<script>
const API = 'https://ai-sponsor-f7de.onrender.com/api/metrics/northstar';
const MILESTONES = [
  { days: 1,   em: '🌱', label: '24 hrs' },
  { days: 7,   em: '🌿', label: '1 week' },
  { days: 30,  em: '🥉', label: '30 days' },
  { days: 90,  em: '🥇', label: '90 days' },
  { days: 365, em: '🏆', label: '1 year' },
];

async function load(attempt) {
  try {
    const r = await fetch(API, { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    render(await r.json());
  } catch (e) {
    if (attempt < 3) { setTimeout(() => load(attempt + 1), 20000); return; }
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error');
    err.style.display = 'block';
    err.innerHTML = 'Could not reach the live data.<br>Refresh in a minute — the server may be waking up.';
  }
}

function countUp(el, target) {
  const dur = 1400, t0 = performance.now();
  (function tick(t) {
    const p = Math.min(1, (t - t0) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(target * eased).toLocaleString();
    if (p < 1) requestAnimationFrame(tick);
  })(t0);
}

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('dash').style.display = 'block';

  const ns = d.northStar;
  countUp(document.getElementById('ns-value'), ns.cumulativeRecoveryDays);

  // Pre-launch: nobody has signed up yet. Zero is the honest number, but the
  // copy below is written for a live product — "grows by 0 days every single
  // day" under a big 0 reads as broken rather than as not-started. Matt's beta
  // list sits staged in GHL and deliberately isn't counted: a list isn't a user.
  const notStarted = ns.cumulativeRecoveryDays === 0 && (!d.usage || d.usage.registeredUsers === 0);
  const years = ns.cumulativeRecoveryDays / 365;

  document.getElementById('ns-meaning').textContent = notStarted
    ? 'No one has signed up yet — this starts counting the day the first person redeems their code.'
    : years >= 1
      ? 'That’s ' + years.toFixed(1) + ' years of recovery — nights nobody faced alone.'
      : 'Every one of these days, someone had a sponsor in their pocket.';

  document.getElementById('ns-growth').textContent = notStarted
    ? 'waiting on the first sign-up'
    : 'grows by ' + ns.activeUsers.toLocaleString() + ' days — every single day';

  document.getElementById('stamp').textContent =
    'Live · updated ' + new Date(d.generatedAt).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });

  document.getElementById('t-users').textContent = ns.activeUsers.toLocaleString();
  document.getElementById('t-avg').textContent = ns.avgDaysPerUser;
  document.getElementById('t-cancel').textContent =
    ns.cancellations === 0 ? 'none 💙' : ns.cancellations;
  document.getElementById('t-7d').textContent = d.usage ? d.usage.activeLast7d : '—';

  drawChips(d.signups.byDay);
  drawChart(d.signups.byDay, ns.activeUsers);

  document.getElementById('notes').innerHTML =
    d.dataNotes.map(n => '<li>' + n + '</li>').join('');
}

// How many people have passed each milestone (from their sign-up dates).
function drawChips(byDay) {
  const now = Date.now();
  const el = document.getElementById('chips');
  el.innerHTML = MILESTONES.map(m => {
    let n = 0;
    Object.entries(byDay).forEach(([day, count]) => {
      const days = Math.floor((now - new Date(day).getTime()) / 86400000) + 1;
      if (days >= m.days) n += count;
    });
    return '<div class="chip' + (n > 0 ? ' won' : '') + '">' +
      '<div class="em">' + m.em + '</div><div class="n">' + n + '</div>' +
      '<div class="l">' + m.label + '</div></div>';
  }).join('');
}

// Cumulative recovery days over the last 14 days, reconstructed from sign-up dates.
function drawChart(byDay, activeUsers) {
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const t = new Date(); t.setHours(12, 0, 0, 0); t.setDate(t.getDate() - i);
    let total = 0;
    Object.entries(byDay).forEach(([day, count]) => {
      const d0 = new Date(day).getTime();
      if (d0 <= t.getTime()) total += count * (Math.floor((t.getTime() - d0) / 86400000) + 1);
    });
    days.push({ label: (t.getMonth() + 1) + '/' + t.getDate(), v: total });
  }
  const max = Math.max(...days.map(x => x.v), 1);
  const el = document.getElementById('chart');
  const W = 600, H = 160, padB = 18, padL = 30, padT = 8;
  const iw = W - padL, ih = H - padB - padT;
  const yMax = Math.ceil(max * 1.1);
  const x = i => padL + (iw / (days.length - 1)) * i;
  const y = v => padT + ih - (v / yMax) * ih;

  let path = '', area = '';
  days.forEach((dY, i) => {
    path += (i ? ' L' : 'M') + x(i).toFixed(1) + ' ' + y(dY.v).toFixed(1);
  });
  area = path + ' L' + x(days.length - 1) + ' ' + (padT + ih) + ' L' + x(0) + ' ' + (padT + ih) + ' Z';

  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" aria-label="Cumulative recovery days, last 14 days">';
  [0.5, 1].forEach(f => {
    const gy = padT + ih - ih * f;
    svg += '<line class="gridline" x1="' + padL + '" y1="' + gy + '" x2="' + W + '" y2="' + gy + '"/>' +
           '<text class="tick" x="0" y="' + (gy + 3) + '">' + Math.round(yMax * f).toLocaleString() + '</text>';
  });
  svg += '<path d="' + area + '" fill="var(--chart-fill)"/>' +
         '<path d="' + path + '" fill="none" stroke="var(--chart)" stroke-width="2.5" stroke-linecap="round"/>';
  days.forEach((dY, i) => {
    if (i % 3 === 1) {
      svg += '<text class="tick" x="' + x(i) + '" y="' + (H - 4) + '" text-anchor="middle">' + dY.label + '</text>';
    }
    svg += '<rect data-i="' + i + '" x="' + (x(i) - iw / days.length / 2) + '" y="' + padT +
      '" width="' + (iw / days.length) + '" height="' + ih + '" fill="transparent"/>';
  });
  // today marker
  svg += '<circle cx="' + x(days.length - 1) + '" cy="' + y(days[days.length - 1].v) + '" r="4.5" fill="var(--chart)"/>';
  svg += '</svg>';
  el.insertAdjacentHTML('beforeend', svg);

  const tip = document.getElementById('tip');
  el.querySelectorAll('[data-i]').forEach(node => {
    node.addEventListener('mousemove', (ev) => {
      const dY = days[+node.dataset.i];
      tip.style.display = 'block';
      tip.textContent = dY.label + ' — ' + dY.v.toLocaleString() + ' days';
      const r = el.getBoundingClientRect();
      tip.style.left = Math.min(ev.clientX - r.left + 10, r.width - 130) + 'px';
      tip.style.top = (ev.clientY - r.top - 30) + 'px';
    });
    node.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
  });
}

load(0);
</script>
</body>
</html>
